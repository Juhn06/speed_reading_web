{% extends "base.html" %}

{% block title %}Đăng nhập - Speed Reading{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-sign-in-alt"></i> Đăng nhập</h1>
                <p>Chào mừng trở lại! Vui lòng đăng nhập để tiếp tục.</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Tên đăng nhập
                    </label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-control" 
                           placeholder="Nhập tên đăng nhập"
                           required
                           autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Nhập mật khẩu"
                           required>
                </div>
                
                <div class="form-group form-check">
                    <input type="checkbox" 
                           id="remember" 
                           name="remember" 
                           class="form-check-input">
                    <label for="remember" class="form-check-label">
                        Ghi nhớ đăng nhập
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Chưa có tài khoản? 
                    <a href="{{ url_for('auth.register') }}">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
