<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reading - Luyện Đọc Nhanh</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 HỆ THỐNG LUYỆN ĐỌC NHANH</h1>

        <div class="upload-box">
            <h2>Bước 1: Tải tài liệu lên</h2>
            <input type="file" id="fileInput" accept=".txt,.docx,.pdf">
            <button onclick="uploadFile()">📤 Upload</button>
        </div>

        <div class="speed-box" id="speedBox" style="display:none;">
            <h2>Bước 2: Chọn tốc độ đọc</h2>
            <label>Tốc độ: <span id="speedValue">200</span> từ/phút</label>
            <input type="range" id="speedSlider" min="100" max="500" value="200" step="50">
            <button onclick="startReading()">▶️ Bắt đầu đọc</button>
        </div>
    </div>

    <script>
        let wordsData = [];

        // Hiển thị giá trị tốc độ
        document.getElementById('speedSlider').oninput = function() {
            document.getElementById('speedValue').textContent = this.value;
        };

        // Upload file
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('⚠️ Vui lòng chọn file!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('❌ Lỗi: ' + data.error);
                    return;
                }

                wordsData = data.words;
                alert(`✅ Đã tải ${data.total} từ từ file "${data.filename}"`);

                // Hiện phần chọn tốc độ
                document.getElementById('speedBox').style.display = 'block';

            } catch (error) {
                alert('❌ Lỗi kết nối: ' + error);
            }
        }

        // Chuyển sang trang đọc
        function startReading() {
            const speed = document.getElementById('speedSlider').value;

            // Lưu dữ liệu vào localStorage
            localStorage.setItem('words', JSON.stringify(wordsData));
            localStorage.setItem('speed', speed);

            // Chuyển trang
            window.location.href = '/reader';
        }
    </script>
</body>
</html>
